# ⚠️  CADDY-VARIANT (reverse proxy + auto-TLS, bindt poort 80/443).
#  NIET gebruiken op de siersma.farcon.cloud-VPS! Die draait via de Cloudflare-
#  tunnel met de BASIS docker-compose.yml + override (127.0.0.1:8090). Caddy bindt
#  80/443 en geeft daar "address already in use". Op die VPS:  ./deploy.sh
#
#  Dit bestand is alleen voor een machine waar JIJ zelf 80/443 + TLS afhandelt
#  (geen tunnel/externe proxy):
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  kingen:
    build: .
    image: kingen:latest
    container_name: kingen
    restart: unless-stopped
    environment:
      - PORT=8080
      - MAX_ROOMS=4
      - MOVE_TIMEOUT_MS=60000
      - RECONNECT_GRACE_MS=120000
      - STATS_FILE=/data/stats.json
    expose:
      - "8080"
    volumes:
      - kingen_data:/data

  caddy:
    image: caddy:2
    container_name: kingen-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - kingen

volumes:
  kingen_data:
  caddy_data:
  caddy_config:
