# Productie (VPS): app achter Caddy als reverse proxy met automatische HTTPS.
# Caddy termineert TLS en proxyt ook de WebSocket-upgrade naar de app.
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  kingen:
    build: .
    image: kingen:latest
    container_name: kingen
    restart: unless-stopped
    environment:
      - PORT=8080
      - MAX_ROOMS=4
      - MOVE_TIMEOUT_MS=60000
      - RECONNECT_GRACE_MS=120000
      - STATS_FILE=/data/stats.json
    expose:
      - "8080"
    volumes:
      - kingen_data:/data

  caddy:
    image: caddy:2
    container_name: kingen-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - kingen

volumes:
  kingen_data:
  caddy_data:
  caddy_config:
