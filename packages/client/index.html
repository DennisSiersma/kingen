<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DJS Games" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>DJS Games</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='2' width='26' height='28' rx='4' fill='%230a0a0f' stroke='%23c9a227' stroke-width='1.5'/%3E%3Ctext x='16' y='21' font-size='11' text-anchor='middle' fill='%23e8c75a' font-family='Georgia,serif' font-weight='bold'%3EDJS%3C/text%3E%3C/svg%3E" />
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; overscroll-behavior: none; }
      #app { position: fixed; inset: 0; }
      /* touch-action:none → iOS Safari kaapt geen tap/sleep meer voor pan/pinch/dubbeltik-zoom op het 3D-canvas (kaart-/dobbelscene). */
      #app canvas { display: block; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
      #ui { position: fixed; inset: 0; pointer-events: none; -webkit-tap-highlight-color: transparent; }
      #ui > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui"></div>
    <a id="kg-credit" href="stats.html" title="Statistieken — ontworpen door DJS" aria-label="Statistieken bekijken">DJS</a>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
