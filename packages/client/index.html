<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Kingen — 3D Kaartspel</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='2' width='24' height='28' rx='3' fill='%23fdfdf6' stroke='%23333' stroke-width='1'/%3E%3Ctext x='16' y='22' font-size='16' text-anchor='middle' fill='%23c0392b' font-family='Georgia,serif' font-weight='bold'%3EK%3C/text%3E%3C/svg%3E" />
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; overscroll-behavior: none; }
      #app { position: fixed; inset: 0; }
      /* touch-action:none → iOS Safari kaapt geen tap/sleep meer voor pan/pinch/dubbeltik-zoom op het 3D-canvas (kaart-/dobbelscene). */
      #app canvas { display: block; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
      #ui { position: fixed; inset: 0; pointer-events: none; -webkit-tap-highlight-color: transparent; }
      #ui > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui"></div>
    <div id="kg-credit" title="Ontworpen door DJS" aria-label="Ontworpen door DJS">DJS</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
